# NVIDIA GPU overlay for Gazebo simulation.
#
# Requires the NVIDIA Container Toolkit:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Usage (layer on top of any sim-containing compose file):
#   docker compose -f compose-sim-viz-nav2.yaml -f compose.nvidia.yaml up
#   docker compose -f compose-sim-viz.yaml       -f compose.nvidia.yaml up

services:
  sim:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,compute,display
      # PRIME render offload — routes GLX rendering to the discrete NVIDIA GPU
      # on Optimus (Intel+NVIDIA) laptops.
      __NV_PRIME_RENDER_OFFLOAD: "1"
      __GLX_VENDOR_LIBRARY_NAME: nvidia
      __VK_LAYER_NV_optimus: NVIDIA_only

  viz:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,compute,display
      __NV_PRIME_RENDER_OFFLOAD: "1"
      __GLX_VENDOR_LIBRARY_NAME: nvidia
      __VK_LAYER_NV_optimus: NVIDIA_only
