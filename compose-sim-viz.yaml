# Compose file for running sim and viz containers together.
# These containers communicate via ROS 2 using host network.
#
# Usage:
#   xhost +local:
#   SETUP_PATH_HOST=$HOME/clearpath docker compose -f compose-sim-viz.yaml up
#
# Drive the sim from viz: use the RViz interface to send goals and commands
# to the sim running in the parallel container.

services:
  sim:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-sim-latest
    container_name: cpr-sim-${ROS_DISTRO:-jazzy}
    user: robot
    network_mode: host
    ipc: host
    environment:
      SETUP_PATH: ${SETUP_PATH:-/etc/clearpath}
      DISPLAY: ${DISPLAY:-:0}
    volumes:
      - ${SETUP_PATH_HOST:-${HOME}/clearpath/}:/etc/clearpath/  # rw (default): sim generates URDF, SRDF, configs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/robot/.Xauthority:ro
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash &&
          timeout 8 ros2 topic echo /clock --once >/dev/null 2>&1 &&
          ros2 topic list --no-daemon 2>/dev/null | grep -qE '/[^/]+/platform/odom/filtered$'
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 120s
    stdin_open: true
    tty: true

  viz:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-viz-latest
    container_name: cpr-viz-${ROS_DISTRO:-jazzy}
    user: robot
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    ipc: host
    environment:
      SETUP_PATH: ${SETUP_PATH:-/etc/clearpath}
      DISPLAY: ${DISPLAY:-:0}
      ROBOT_NAMESPACE: ${ROBOT_NAMESPACE:-}
      USE_SIM_TIME: ${USE_SIM_TIME:-true}
      WAIT_FOR_TIMEOUT_SEC: ${WAIT_FOR_TIMEOUT_SEC:-120}
      CLEARPATH_VIZ_CONFIG: ${CLEARPATH_VIZ_CONFIG:-robot}
    volumes:
      - ${SETUP_PATH_HOST:-${HOME}/clearpath/}:/etc/clearpath/:ro  # ro: viz only reads config
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/robot/.Xauthority:ro
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "pgrep -f rviz2 >/dev/null"
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 60s
    stdin_open: true
    tty: true
    depends_on:
      sim:
        condition: service_healthy
