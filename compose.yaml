# Compose file for the Clearpath dev, sim, and viz images.
#
# Usage:
#   docker compose up -d dev
#   docker compose exec dev bash
#   docker compose up sim                 # Launch simulation only
#   docker compose up nav2                # Launch Nav2 demos only
#   docker compose up viz                 # Launch visualization only
#   docker compose up sim nav2 viz        # Launch simulation + Nav2 + visualization
#   docker compose -f compose-sim-viz.yaml up  # Launch sim + viz together
#   docker compose -f compose-sim-viz-nav2.yaml up  # Launch sim + nav2 + viz together
#
# Override knobs (set in a .env file or on the command line):
#   ROS_DISTRO  - humble | jazzy | lyrical | rolling (default: jazzy)
#   ROS2_WS     - path to your ROS 2 workspace on the host (default: ~/ros2_ws)
#   SETUP_PATH  - setup path passed to clearpath_gz simulation launch
#                 (default in container: /home/robot/setup/path/)
#   SETUP_PATH_HOST - host directory to mount into /home/robot/setup/path/
#                     (default: $HOME/clearpath/)
#   USE_SIM_TIME - true/false for Nav2 demos in simulation (default: true)
#   SCAN_TOPIC   - optional lidar topic override for 3D lidar setups
#
# For host-specific tweaks (USB devices, extra mounts, etc.), create a
# compose.override.yaml — see compose.override.yaml.example.

services:
  dev:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-dev-latest
    container_name: cpr-dev-${ROS_DISTRO:-jazzy}
    user: robot
    network_mode: host
    working_dir: /home/robot/ros2_ws
    volumes:
      - ${ROS2_WS:-~/ros2_ws}:/home/robot/ros2_ws
      - ${HOME}/.clearpath_docker_history:/commandhistory
    stdin_open: true
    tty: true
    command: bash

  # Opt-in: rebuild the dev image locally with the host user's uid/gid so
  # files created in the mounted workspace are owned by you (instead of
  # uid 1000). Use this if your host user is not uid/gid 1000.
  #
  #   docker compose up -d --build dev-local
  #   docker compose exec dev-local bash
  dev-local:
    extends:
      service: dev
    image: cpr-dev:${ROS_DISTRO:-jazzy}-local
    container_name: cpr-dev-${ROS_DISTRO:-jazzy}-local
    build:
      context: .
      dockerfile: cpr-dev.Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
        CPR_BASE_IMAGE: ghcr.io/clearpathrobotics/clearpath_docker
        CPR_BASE_TAG: ${ROS_DISTRO:-jazzy}-latest
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}

  sim:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-sim-latest
    container_name: cpr-sim-${ROS_DISTRO:-jazzy}
    user: robot
    network_mode: host
    ipc: host
    environment:
      SETUP_PATH: ${SETUP_PATH:-/home/robot/setup/path/}
      DISPLAY: ${DISPLAY:-:0}
      SIM_STARTUP_TIMEOUT_S: ${SIM_STARTUP_TIMEOUT_S:-120}
      GAZEBO_STARTUP_TIMEOUT: ${GAZEBO_STARTUP_TIMEOUT:-120}
      GAZEBO_MAX_RESTARTS: ${GAZEBO_MAX_RESTARTS:-3}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      CYCLONEDDS_URI: '${CYCLONEDDS_URI:-<CycloneDDS><Domain><Discovery><ParticipantIndex>none</ParticipantIndex></Discovery></Domain></CycloneDDS>}'
    volumes:
      - ${SETUP_PATH_HOST:-${HOME}/clearpath/}:/home/robot/setup/path/
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/robot/.Xauthority:ro
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash &&
          timeout 8 ros2 topic echo /clock --once >/dev/null 2>&1 &&
          ros2 topic list --no-daemon 2>/dev/null | grep -qE '/[^/]+/platform/odom/filtered$'
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 120s
    stdin_open: true
    tty: true

  nav2:
    image: cpr-nav2:${ROS_DISTRO:-jazzy}-local
    container_name: cpr-nav2-${ROS_DISTRO:-jazzy}
    build:
      context: .
      dockerfile: cpr-nav2.Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-jazzy}
        CPR_BASE_IMAGE: ghcr.io/clearpathrobotics/clearpath_docker
        CPR_BASE_TAG: ${ROS_DISTRO:-jazzy}-dev-latest
    user: robot
    network_mode: host
    environment:
      SETUP_PATH: ${SETUP_PATH:-/home/robot/setup/path/}
      ROBOT_NAMESPACE: ${ROBOT_NAMESPACE:-}
      USE_SIM_TIME: ${USE_SIM_TIME:-true}
      WAIT_FOR_SIM: ${WAIT_FOR_SIM:-false}
      WAIT_FOR_TIMEOUT_SEC: ${WAIT_FOR_TIMEOUT_SEC:-120}
      SCAN_TOPIC: ${SCAN_TOPIC:-}
      NAV2_LAUNCH_FILE: ${NAV2_LAUNCH_FILE:-nav2.launch.py}
      NAV2_ENABLE_SLAM: ${NAV2_ENABLE_SLAM:-false}
      NAV2_SLAM_SYNC: ${NAV2_SLAM_SYNC:-false}
      NAV2_STARTUP_TIMEOUT_S: ${NAV2_STARTUP_TIMEOUT_S:-120}
      NAV2_SERVICE_CALL_TIMEOUT_S: ${NAV2_SERVICE_CALL_TIMEOUT_S:-8}
      NAV2_ACTIVE_WAIT_TIMEOUT_S: ${NAV2_ACTIVE_WAIT_TIMEOUT_S:-60}
      NAV2_TOPIC_WAIT_TIMEOUT_S: ${NAV2_TOPIC_WAIT_TIMEOUT_S:-120}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      CYCLONEDDS_URI: '${CYCLONEDDS_URI:-<CycloneDDS><Domain><Discovery><ParticipantIndex>none</ParticipantIndex></Discovery></Domain></CycloneDDS>}'
    volumes:
      - ${SETUP_PATH_HOST:-${HOME}/clearpath/}:/home/robot/setup/path/:ro
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash &&
          ros2 node list --no-daemon 2>/dev/null | grep -qE '/[^/]+/bt_navigator$' &&
          ros2 action list --no-daemon 2>/dev/null | grep -qE '/[^/]+/navigate_to_pose$'
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 150s
    depends_on:
      sim:
        condition: service_healthy
    stdin_open: true
    tty: true

  viz:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-viz-latest
    container_name: cpr-viz-${ROS_DISTRO:-jazzy}
    user: robot
    network_mode: host
    devices:
      - /dev/dri:/dev/dri
    ipc: host
    environment:
      SETUP_PATH: ${SETUP_PATH:-/home/robot/setup/path/}
      DISPLAY: ${DISPLAY:-:0}
      ROBOT_NAMESPACE: ${ROBOT_NAMESPACE:-}
      USE_SIM_TIME: ${USE_SIM_TIME:-true}
      WAIT_FOR_TIMEOUT_SEC: ${WAIT_FOR_TIMEOUT_SEC:-120}
      CLEARPATH_VIZ_CONFIG: ${CLEARPATH_VIZ_CONFIG:-robot}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      CYCLONEDDS_URI: '${CYCLONEDDS_URI:-<CycloneDDS><Domain><Discovery><ParticipantIndex>none</ParticipantIndex></Discovery></Domain></CycloneDDS>}'
    volumes:
      - ${SETUP_PATH_HOST:-${HOME}/clearpath/}:/home/robot/setup/path/:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/robot/.Xauthority:ro
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "pgrep -f rviz2 >/dev/null"
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 60s
    depends_on:
      sim:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ─── Robot (real hardware) ────────────────────────────────────────────
  # Controls the physical robot via USB, Ethernet, and CAN bus.
  # Requires: SETUP_PATH_HOST pointing to a directory containing robot.yaml.
  #
  # Usage:
  #   SETUP_PATH_HOST=$HOME/clearpath docker compose up robot
  #   ROS_DISTRO=humble RMW_IMPLEMENTATION=rmw_fastrtps_cpp SETUP_PATH_HOST=$HOME/clearpath docker compose up robot
  robot:
    image: ghcr.io/clearpathrobotics/clearpath_docker:${ROS_DISTRO:-jazzy}-robot-latest
    container_name: cpr-robot-${ROS_DISTRO:-jazzy}
    privileged: true
    network_mode: host
    cgroup: host
    environment:
      container: docker
      SETUP_PATH: ${SETUP_PATH:-/etc/clearpath/}
      ROS_DISTRO: ${ROS_DISTRO:-jazzy}
      # Humble robot firmware requires FastDDS — set RMW_IMPLEMENTATION=rmw_fastrtps_cpp when using ROS_DISTRO=humble.
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      ROS_AUTOMATIC_DISCOVERY_RANGE: ${ROS_AUTOMATIC_DISCOVERY_RANGE:-LOCALHOST}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      CYCLONEDDS_URI: '${CYCLONEDDS_URI:-<CycloneDDS><Domain><Discovery><ParticipantIndex>none</ParticipantIndex></Discovery></Domain></CycloneDDS>}'
    volumes:
      - ${SETUP_PATH_HOST:?SETUP_PATH_HOST must be set to the directory containing robot.yaml}:/etc/clearpath/
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    tmpfs:
      - /run
      - /run/lock
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          source /opt/ros/${ROS_DISTRO:-jazzy}/setup.bash &&
          ros2 node list --no-daemon 2>/dev/null | grep -qE "platform"
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    stdin_open: true
    tty: true
